name: Bug Report
description: Report a bug or unexpected behavior in Frosty
title: "[Bug]: "
labels: ["bug"]
body:

  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I am using the official Frosty release from the GitHub releases page
          required: true
        - label: I have searched existing issues and this has not been reported before
          required: true
        - label: I have rebooted after enabling the relevant feature
          required: true

  - type: dropdown
    id: root
    attributes:
      label: Root implementation
      options:
        - Magisk
        - KernelSU
        - APatch
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        **Root variant** — select the one that applies:
        - Magisk: Official / Alpha / Kitsune
        - KernelSU: KernelSU / KSU Next / WildKSU / SukiSU
        - APatch: APatch / FolkPatch

  - type: input
    id: root_variant
    attributes:
      label: Root variant
      placeholder: e.g. KSU Next
    validations:
      required: true

  - type: input
    id: root_version
    attributes:
      label: Root version
      placeholder: e.g. 12187
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: e.g. OnePlus 13
    validations:
      required: true

  - type: input
    id: firmware
    attributes:
      label: Firmware
      description: ROM name and version
      placeholder: e.g. crDroid 11.0 / OxygenOS 16
    validations:
      required: true

  - type: input
    id: android
    attributes:
      label: Android version
      placeholder: e.g. Android 15
    validations:
      required: true

  - type: input
    id: frosty_version
    attributes:
      label: Frosty version
      placeholder: e.g. 3.5
    validations:
      required: true

  - type: dropdown
    id: feature
    attributes:
      label: Affected feature
      options:
        - Kernel Tweaks
        - System Props
        - RAM Optimizer
        - Kill Logs
        - Kill Google Tracking
        - GMS Doze
        - Deep Doze
        - Battery Saver Tuner
        - Doze Whitelist
        - WebUI / Interface
        - Install / Uninstall
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        **Frosty logs** *(optional but highly recommended)*
        Run the following command in Termux or any terminal app:
        ```sh
        VER=$(su -c "grep '^version=' /data/adb/modules/Frosty/module.prop | cut -d= -f2" 2>/dev/null)
        OUT="/sdcard/Frosty_${VER:-unknown}_$(date +%Y%m%d_%H%M%S).txt"
        su -c '
        D=/data/adb/modules/Frosty
        L=$(ls "$D/logs/"*.log 2>/dev/null)
        [ -z "$L" ] && echo "No logs found" >&2 && exit 1
        echo "Installed modules:"
        i=1; for m in $(ls /data/adb/modules 2>/dev/null); do echo "  $i. $m"; i=$((i+1)); done
        echo ""
        echo "File list:"
        for f in $L; do echo "  $(basename "$f")"; done
        echo ""
        for f in $L; do echo "====$(basename "$f")===="; cat "$f"; echo ""; done
        ' > "$OUT" && echo "Saved: $OUT" || echo "Error: grant storage permission in Termux first"
        ```
        Then attach the `Frosty_*.txt` file found in the root of your internal storage below (click the attach file button).

  - type: textarea
    id: logs
    attributes:
      label: Frosty logs
      description: Attach the exported Frosty_*.txt file here, or paste relevant log content directly. Remove any personal info before posting.
      placeholder: Drag and drop the Frosty_*.txt file here, or paste log content...